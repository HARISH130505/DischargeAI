name: DischargeAI
version: "1.0.0"
description: "A clinical decision-making environment for safe hospital discharge planning."
tags:
  - healthcare
  - clinical-decision

tasks:
  - id: EASY
    name: EASY
    description: "Stable post-appendectomy patient with full home support. Correct action: discharge."
    difficulty: easy
    max_steps: 5
    grader: "graders:grade_easy"
    reward_range:
      - 0.0
      - 1.0

  - id: MEDIUM
    name: MEDIUM
    description: "Hip replacement patient with high fall risk and limited home support. Correct action: refer."
    difficulty: medium
    max_steps: 5
    grader: "graders:grade_medium"
    reward_range:
      - 0.0
      - 1.0

  - id: HARD
    name: HARD
    description: "COPD patient with borderline vitals and poor home setup. Correct action: keep then discharge."
    difficulty: hard
    max_steps: 5
    grader: "graders:grade_hard"
    reward_range:
      - 0.0
      - 1.0
